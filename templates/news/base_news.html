<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ seo_title | default("Astrology News | big3.me") }}</title>
    <meta name="description" content="{{ seo_description | default('Daily astrology transit analysis and cosmic weather updates.') }}">

    <!-- OG Tags -->
    <meta property="og:title" content="{{ seo_title | default('Astrology News | big3.me') }}">
    <meta property="og:description" content="{{ seo_description | default('Daily astrology transit analysis and cosmic weather updates.') }}">
    <meta property="og:image" content="{{ og_image | default('https://big3.me/og-image.png') }}">
    <meta property="og:url" content="https://big3.me/news/{{ slug | default('') }}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="big3.me">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ seo_title | default('Astrology News | big3.me') }}">
    <meta name="twitter:description" content="{{ seo_description | default('Daily astrology transit analysis and cosmic weather updates.') }}">
    <meta name="twitter:image" content="{{ og_image | default('https://big3.me/og-image.png') }}">

    <!-- Canonical -->
    <link rel="canonical" href="https://big3.me/news/{{ slug | default('') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    {% block head_extra %}{% endblock %}

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #e8e8e8;
            --muted: #8e8e93;
            --accent: #6c63ff;
            --border: rgba(255,255,255,0.08);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .news-nav {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            max-width: 800px;
            margin: 0 auto;
        }

        .news-nav .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
        }

        .news-nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .news-nav a:hover { color: var(--text); }

        .news-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .post-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .post-subtitle {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .post-tag {
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .post-tag:hover { background: rgba(108, 99, 255, 0.25); }

        .post-body p {
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .post-body h2 {
            font-size: 1.4rem;
            margin: 40px 0 16px;
            color: var(--text);
        }

        .post-body img {
            width: 100%;
            border-radius: var(--radius);
            margin: 24px 0;
            border: 1px solid var(--border);
        }

        .post-hero {
            width: 100%;
            border-radius: var(--radius);
            margin-bottom: 32px;
            max-height: 400px;
            object-fit: cover;
        }

        .post-cta {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin: 40px 0;
            text-align: center;
        }

        .post-cta p {
            color: var(--muted);
            margin-bottom: 12px;
        }

        .post-cta a {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .post-cta a:hover { opacity: 0.9; }

        /* Feed styles */
        .feed-card {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
        }

        .feed-card a {
            text-decoration: none;
            color: inherit;
        }

        .feed-card h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .feed-card a:hover h2 { color: var(--accent); }

        .feed-card p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .feed-tags {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .feed-empty {
            color: var(--muted);
            margin-top: 40px;
            text-align: center;
        }

        footer.news-footer {
            max-width: 720px;
            margin: 60px auto 0;
            padding: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }

        footer.news-footer a {
            color: var(--muted);
            text-decoration: none;
        }

        footer.news-footer a:hover { color: var(--text); }

        @media (max-width: 600px) {
            .post-title { font-size: 1.5rem; }
            .news-container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <nav class="news-nav">
        <a href="/" class="logo">big3.me</a>
        <a href="/news">News</a>
    </nav>

    <main class="news-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="news-footer">
        <p><a href="/">big3.me</a> &middot; Apple Weather for Astrology</p>
    </footer>
</body>
</html>
