name: Upload post images to Supabase Storage

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'tmp/post-images/**/*.html'
      - 'scripts/fix_html_unicode.py'

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Fix Unicode escape sequences in HTML files
        run: python scripts/fix_html_unicode.py tmp/post-images/

      - name: Detect slug from HTML files
        id: detect
        run: |
          if [ -f tmp/post-images/slug.txt ]; then
            SLUG=$(cat tmp/post-images/slug.txt | tr -d '[:space:]')
          else
            SLUG=$(git log -1 --pretty=%B | grep -oP 'slug[=: ]+\K[\w-]+' || echo "")
          fi

          if [ -z "$SLUG" ]; then
            echo "ERROR: Could not detect slug. Create tmp/post-images/slug.txt with the post slug."
            exit 1
          fi

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Detected slug: $SLUG"

      - name: Render HTML to PNG and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/render_and_upload_images.py "${{ steps.detect.outputs.slug }}" tmp/post-images/
