name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app scripts tests server.py

      - name: Format check
        run: ruff format --check app scripts tests server.py

      - name: Type check
        run: mypy app/

      - name: Tests
        run: python -m unittest discover -s tests
