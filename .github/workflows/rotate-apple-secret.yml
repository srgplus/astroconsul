name: Rotate Apple SIWA Secret

on:
  schedule:
    # Run on the 1st of every 5th month (Jan, Jun)
    - cron: '0 12 1 1,6 *'
  workflow_dispatch: # Allow manual trigger

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install PyJWT cryptography

      - name: Rotate Apple client secret
        env:
          APPLE_TEAM_ID: '85679N47YT'
          APPLE_CLIENT_ID: 'me.big3.auth'
          APPLE_KEY_ID: 'T722Z7TX6W'
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          SUPABASE_PROJECT_REF: 'penhmylyqxzxvjxrbxen'
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: python scripts/rotate_apple_secret.py
